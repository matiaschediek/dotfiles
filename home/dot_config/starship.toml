"$schema" = 'https://starship.rs/config-schema.json'

format = """
$directory\
$git_branch\
$git_status\
$golang\
$nodejs\
$python\
$rust\
$java\
$docker_context\
$cmd_duration\
$line_break\
$character"""

# ─── DIRECTORY ────────────────────────────────────────────────────────────────
[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"

# ─── GIT ──────────────────────────────────────────────────────────────────────
[git_branch]
symbol = "🌿 "
format = "on [$symbol$branch]($style) "
style = "bold green"
truncation_length = 30

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold yellow"
conflicted = "⚡"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = "≡"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

# ─── LENGUAJES ────────────────────────────────────────────────────────────────
[golang]
symbol = "🐹"
format = "via [$symbol]($style) "
style = "bold cyan"

[nodejs]
symbol = "⬢"
format = "via [$symbol]($style) "
style = "bold green"

[python]
symbol = "🐍"
format = 'via [$symbol(\($virtualenv\))]($style) '
style = "bold yellow"

[rust]
symbol = "🦀"
format = "via [$symbol]($style) "
style = "bold red"

[java]
symbol = "☕"
format = "via [$symbol]($style) "
style = "bold red"

# ─── DOCKER ───────────────────────────────────────────────────────────────────
[docker_context]
disabled = true

# ─── UTILS ────────────────────────────────────────────────────────────────────
[cmd_duration]
min_time = 0
show_milliseconds = true
format = "took [$duration]($style) "
style = "bold yellow"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

# ─── DESACTIVADOS ─────────────────────────────────────────────────────────────
[gcloud]
disabled = true

[aws]
disabled = true
